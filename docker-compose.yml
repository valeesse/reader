services:
  zenith-reader:
    build: .
    ports:
      - "8080:8080"
    environment:
      ZENITH_BIND: 0.0.0.0:8080
      ZENITH_AUTH_TOKEN: ${ZENITH_AUTH_TOKEN:-}
    volumes:
      - ./books:/data/books:ro
      - zenith-state:/data/state
      - zenith-cache:/data/cache
    restart: unless-stopped

volumes:
  zenith-state:
  zenith-cache:
