<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Zenith Reader: quiet, tactile, and legible at every macOS icon size. -->
  <rect x="32" y="32" width="960" height="960" rx="224" fill="#1D1D1F"/>
  <rect x="44" y="44" width="936" height="936" rx="212" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="24"/>

  <!-- A single warm point: zenith as a reading guide, not decoration. -->
  <circle cx="512" cy="254" r="44" fill="#FF9F0A"/>

  <!-- The open-book silhouette is deliberately broad and text-free for small sizes. -->
  <path d="M174 402C286 364 410 390 512 472V794C408 716 285 690 174 730V402Z" fill="#F5F5F7"/>
  <path d="M850 402C738 364 614 390 512 472V794C616 716 739 690 850 730V402Z" fill="#F5F5F7"/>
  <path d="M512 472V794" stroke="#A1A1A6" stroke-width="12" stroke-linecap="round"/>

  <!-- Page contours retain the reading cue without becoming visual noise. -->
  <path d="M258 514C326 495 392 513 450 552" stroke="#1D1D1F" stroke-opacity="0.28" stroke-width="20" stroke-linecap="round"/>
  <path d="M766 514C698 495 632 513 574 552" stroke="#1D1D1F" stroke-opacity="0.28" stroke-width="20" stroke-linecap="round"/>
</svg>
